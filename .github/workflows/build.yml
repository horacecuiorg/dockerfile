name: Build and Push Docker Images

on:
  push:
    paths:
      - '**/Dockerfile'
      - '**/entrypoint.py'
      - '**/entrypoint.sh'
  workflow_dispatch:

env:
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_NAMESPACE }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  GHCR_NAMESPACE: ${{ secrets.GHCR_NAMESPACE }}
  GHCR_PAT: ${{ secrets.GHCR_PAT }}
  GHCR_ORG_NAMESPACE: ${{ secrets.GHCR_ORG_NAMESPACE }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKER_NAMESPACE }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_NAMESPACE }}
          password: ${{ env.GHCR_PAT }}

      - name: Detect changed services
        id: changes
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "⚠️ No valid before SHA found. Comparing with parent commit (HEAD~1)..."
            CHANGED_DIRS=$(git diff --name-only HEAD~1 HEAD | awk -F/ '{print $1}' | sort -u)
          else
            git fetch origin "$BEFORE_SHA" --depth=1 || true
            CHANGED_DIRS=$(git diff --name-only "$BEFORE_SHA" ${{ github.sha }} | awk -F/ '{print $1}' | sort -u)
          fi

          SERVICES=""
          for dir in $CHANGED_DIRS; do
            if ls "$dir"/Dockerfile* 1> /dev/null 2>&1; then
              SERVICES="$SERVICES $dir"
            fi
          done

          echo "🔍 Changed directories: $CHANGED_DIRS"
          echo "🚀 Services to build:$SERVICES"

          if [ -n "$SERVICES" ]; then
            echo "--- Service Details with Tags & Version Labels ---"
            echo "### 🚀 Services to Build" >> "$GITHUB_STEP_SUMMARY"
            echo "| Service Directory | Target Image (Tag) | Version Label | Dockerfile |" >> "$GITHUB_STEP_SUMMARY"
            echo "| --- | --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"

            for dir in $SERVICES; do
              for df in "$dir"/Dockerfile*; do
                [ -f "$df" ] || continue
                filename=$(basename "$df")
                dirname=$(basename "$dir")

                # Parse Target Tag
                if [[ "$filename" == "Dockerfile" ]]; then
                  if [[ "$dirname" == *_* ]]; then
                    tag="${dirname#*_}"
                    svc_name="${dirname%%_*}"
                  else
                    tag="latest"
                    svc_name="$dirname"
                  fi
                else
                  tag="${filename#Dockerfile_}"
                  svc_name="$dirname"
                fi

                # Extract LABEL version from Dockerfile
                version=$(python3 -c "import re; m=re.search(r'(?i)LABEL\s+version\s*=\s*[\"\']([^\"\']+)[\"\']', open('$df').read()); print(m.group(1) if m else 'N/A')")

                echo "  🏷️  $dir => $svc_name:$tag | Version: $version ($df)"
                echo "| \`$dir\` | \`$svc_name:$tag\` | \`$version\` | \`$df\` |" >> "$GITHUB_STEP_SUMMARY"
              done
            done
            echo "--------------------------------------------------"
          fi

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

      - name: Build and push each service
        if: steps.changes.outputs.services != ''
        run: |
          IFS=' ' read -r -a services_array <<< "${{ steps.changes.outputs.services }}"
          rm -f images.txt
          failed_services=()
          for dir in "${services_array[@]}"; do
            echo "👉 Building $dir"
            if ! bash public_scripts/build_one_Dockerfile.sh "$dir"; then
              echo "❌ Failed to build $dir"
              failed_services+=("$dir")
            else
              echo "✅ Successfully built and pushed $dir"
            fi
          done

          echo "--- 推送镜像列表 (Pushed Images Summary) ---"
          cat images.txt || echo "无镜像推送 (No images pushed)"
          echo "--------------------"

          if [ ${#failed_services[@]} -ne 0 ]; then
            echo "❌ The following services failed: ${failed_services[*]}"
            exit 1
          fi
        env:
          DOCKER_NAMESPACE: ${{ env.DOCKER_NAMESPACE }}
          GHCR_ORG_NAMESPACE: ${{ env.GHCR_ORG_NAMESPACE }}

      - name: Show pushed images summary
        run: |
          echo "--- 推送镜像列表 ---"
          cat images.txt || echo "无镜像推送"
          echo "--------------------"
